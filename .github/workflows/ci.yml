name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend (with dev + optional deps)
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Unit tests
        run: python -m unittest discover -s tests

  frontend:
    name: Frontend (build + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci --include=prod --include=dev --include=optional --include=peer
      - name: Verify frontend dependency tree
        run: |
          node -e "for (const pkg of ['@ant-design/icons', 'antd', 'echarts', 'react', 'react-dom', 'zustand', 'typescript', 'vite']) require.resolve(pkg + '/package.json')"
          npm ls @ant-design/icons antd echarts react react-dom zustand typescript vite
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm test
